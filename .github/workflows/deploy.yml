name: CI

on:
  pull_request:
    branches: [main, uat]
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-branch-source:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Verify PR targets main
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$BASE_REF" != "main" ]; then
            echo "::error::PRs must target the main branch. This PR targets '$BASE_REF'."
            exit 1
          fi

  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_admin3
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    - name: Install Python dependencies
      working-directory: ./backend/django_Admin3
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create acted schema
      working-directory: ./backend/django_Admin3
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d test_admin3 -c "CREATE SCHEMA IF NOT EXISTS acted;"

    - name: Run Django migrations
      working-directory: ./backend/django_Admin3
      run: python manage.py migrate --skip-checks --settings=django_Admin3.settings.ci

    - name: Run Django tests
      working-directory: ./backend/django_Admin3
      run: python manage.py test --exclude-tag=pact --settings=django_Admin3.settings.ci

  test-frontend-shard:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/react-Admin3/package-lock.json'

    - name: Cache Vitest transform
      uses: actions/cache@v4
      with:
        path: frontend/react-Admin3/node_modules/.vitest
        key: vitest-${{ runner.os }}-${{ hashFiles('frontend/react-Admin3/package-lock.json') }}

    - name: Install frontend dependencies
      working-directory: ./frontend/react-Admin3
      run: npm ci

    - name: Run frontend tests (shard ${{ matrix.shard }})
      working-directory: ./frontend/react-Admin3
      run: npm test -- --shard=${{ matrix.shard }} --reporter=dot

  test-frontend:
    needs: [test-frontend-shard]
    runs-on: ubuntu-latest
    steps:
    - run: echo "All frontend test shards passed"

  build-frontend:
    needs: [test-frontend]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/react-Admin3/package-lock.json'

    - name: Install frontend dependencies
      working-directory: ./frontend/react-Admin3
      run: npm ci

    - name: Build frontend
      working-directory: ./frontend/react-Admin3
      run: npm run build

  test-pact-consumer:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/react-Admin3/package-lock.json'

    - name: Install frontend dependencies
      working-directory: ./frontend/react-Admin3
      run: npm ci

    - name: Run Pact consumer tests
      working-directory: ./frontend/react-Admin3
      run: npm run test:pact

    - name: Upload Pact contracts
      uses: actions/upload-artifact@v4
      with:
        name: pact-contracts
        path: pacts/*.json
        retention-days: 5

  test-pact-provider:
    needs: [test-pact-consumer]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_admin3
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    - name: Install Python dependencies
      working-directory: ./backend/django_Admin3
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Pact contracts
      uses: actions/download-artifact@v4
      with:
        name: pact-contracts
        path: pacts/

    - name: Create acted schema
      working-directory: ./backend/django_Admin3
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d test_admin3 -c "CREATE SCHEMA IF NOT EXISTS acted;"

    - name: Run Django migrations
      working-directory: ./backend/django_Admin3
      run: python manage.py migrate --skip-checks --settings=django_Admin3.settings.ci

    - name: Run Pact provider verification
      working-directory: ./backend/django_Admin3
      run: python manage.py test pact_tests --settings=django_Admin3.settings.ci

  # TODO: Add production deploy job when production environment is ready.
  # See git history for the previous placeholder deploy job.