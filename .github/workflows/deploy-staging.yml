# .github/workflows/deploy-staging.yml
# Auto-deploy to Windows Server 2019 staging on push to staging branch.
# Requires a self-hosted runner with labels: [self-hosted, windows, staging]

name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  DOCKER_COMPOSE_FILE: docker-compose.yml

jobs:
  # ── Job 1: Run tests on GitHub-hosted runners ──
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_admin3
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - name: Install dependencies
        working-directory: ./backend/django_Admin3
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create schemas
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d test_admin3 -c "CREATE SCHEMA IF NOT EXISTS acted;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d test_admin3 -c "CREATE SCHEMA IF NOT EXISTS adm;"
      - name: Run migrations
        working-directory: ./backend/django_Admin3
        run: python manage.py migrate --skip-checks --settings=django_Admin3.settings.ci
      - name: Run tests
        working-directory: ./backend/django_Admin3
        run: python manage.py test --settings=django_Admin3.settings.ci

  test-frontend-shard:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/react-Admin3/package-lock.json'
      - name: Cache Vitest transform
        uses: actions/cache@v4
        with:
          path: frontend/react-Admin3/node_modules/.vitest
          key: vitest-${{ runner.os }}-${{ hashFiles('frontend/react-Admin3/package-lock.json') }}
      - name: Install dependencies
        working-directory: ./frontend/react-Admin3
        run: npm ci
      - name: Run tests (shard ${{ matrix.shard }})
        working-directory: ./frontend/react-Admin3
        run: npm test -- --shard=${{ matrix.shard }} --reporter=dot

  test-frontend:
    needs: [test-frontend-shard]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All frontend test shards passed"

  build-frontend:
    needs: [test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/react-Admin3/package-lock.json'
      - name: Install dependencies
        working-directory: ./frontend/react-Admin3
        run: npm ci
      - name: Build
        working-directory: ./frontend/react-Admin3
        run: CI=false npm run build

  # ── Job 2: Deploy on self-hosted runner (Windows 11 host, Docker in WSL) ──
  deploy:
    needs: [test-backend, build-frontend]
    runs-on: [self-hosted, windows, staging]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    env:
      WSL_DISTRO: Ubuntu
      WSL_PROJECT_DIR: ~/Admin3
    steps:
      - uses: actions/checkout@v4

      - name: Sync repo into WSL
        shell: powershell
        run: |
          $drive = $pwd.Path.Substring(0,1).ToLower()
          $rest = $pwd.Path.Substring(2) -replace '\\','/'
          $wslSrc = "/mnt/$drive$rest"
          wsl -d $env:WSL_DISTRO -e bash -c "mkdir -p ~/Admin3 && rsync -a --delete --exclude='.env' $wslSrc/ ~/Admin3/"

      - name: Ensure Docker is running
        shell: powershell
        run: |
          wsl -d $env:WSL_DISTRO -e bash -c "sudo service docker start" 2>&1 | Out-Null
          $result = wsl -d $env:WSL_DISTRO -e bash -c "docker info > /dev/null 2>&1 && echo OK || echo FAIL"
          if ($result -ne "OK") { Write-Error "Docker is not running inside WSL!"; exit 1 }
          Write-Host "Docker is running"

      - name: Build Docker images
        shell: powershell
        run: wsl -d $env:WSL_DISTRO -e bash -c "cd ~/Admin3 && docker compose build"

      - name: Stop existing containers
        shell: powershell
        run: wsl -d $env:WSL_DISTRO -e bash -c "cd ~/Admin3 && docker compose down --timeout 30"

      - name: Start new containers
        shell: powershell
        run: wsl -d $env:WSL_DISTRO -e bash -c "cd ~/Admin3 && docker compose up -d"

      - name: Wait for services to be healthy
        shell: powershell
        run: |
          Write-Host "Waiting for services to start..."
          Start-Sleep -Seconds 30

          # Health checks via WSL curl (ports forwarded from Docker)
          $nginxOk = $false
          for ($i = 1; $i -le 6; $i++) {
            $code = wsl -d $env:WSL_DISTRO -e bash -c "curl -k -s -o /dev/null -w '%{http_code}' http://localhost/health 2>/dev/null"
            if ($code -eq "200") {
              Write-Host "Nginx health check passed"
              $nginxOk = $true
              break
            }
            Write-Host "Attempt $i/6: Nginx not ready (got $code), waiting 10s..."
            Start-Sleep -Seconds 10
          }
          if (-not $nginxOk) { Write-Error "Nginx health check failed after 6 attempts"; exit 1 }

          $djangoOk = $false
          for ($i = 1; $i -le 6; $i++) {
            $code = wsl -d $env:WSL_DISTRO -e bash -c "curl -k -s -o /dev/null -w '%{http_code}' https://localhost/api/health/ 2>/dev/null"
            if ($code -eq "200") {
              Write-Host "Django API health check passed"
              $djangoOk = $true
              break
            }
            Write-Host "Attempt $i/6: Django not ready (got $code), waiting 10s..."
            Start-Sleep -Seconds 10
          }
          if (-not $djangoOk) { Write-Error "Django API health check failed after 6 attempts"; exit 1 }

          Write-Host "All health checks passed successfully"

      - name: Show deployment status
        if: always()
        shell: powershell
        run: |
          Write-Host "=== Container Status ==="
          wsl -d $env:WSL_DISTRO -e bash -c "cd ~/Admin3 && docker compose ps"
          Write-Host ""
          Write-Host "=== Recent Backend Logs ==="
          wsl -d $env:WSL_DISTRO -e bash -c "cd ~/Admin3 && docker compose logs backend --tail 15"
          Write-Host ""
          Write-Host "=== Recent Nginx Logs ==="
          wsl -d $env:WSL_DISTRO -e bash -c "cd ~/Admin3 && docker compose logs nginx --tail 10"

      - name: Rollback on failure
        if: failure()
        shell: powershell
        run: |
          Write-Host "Deployment failed! Checking for previous images..."
          wsl -d $env:WSL_DISTRO -e bash -c "cd ~/Admin3 && docker compose logs --tail 50"
          Write-Host ""
          Write-Host "To manually rollback, run:"
          Write-Host "  wsl -d Ubuntu -e bash -c 'cd ~/Admin3 && docker compose down'"
          Write-Host "  wsl -d Ubuntu -e bash -c 'cd ~/Admin3 && git checkout HEAD~1'"
          Write-Host "  wsl -d Ubuntu -e bash -c 'cd ~/Admin3 && docker compose build'"
          Write-Host "  wsl -d Ubuntu -e bash -c 'cd ~/Admin3 && docker compose up -d'"

      - name: Clean up old Docker images
        shell: powershell
        run: wsl -d $env:WSL_DISTRO -e bash -c "docker image prune -f --filter 'until=168h'"
