query getCurrentEventsBySittingAndLifecycle(
   $title: String!
   $first: Int!
   $offset: Int
) {
   events(
      filters: [{ field: title, operation: wordlike, value: $title }]
      first: $first
      offset: $offset
   ) {
      pageInfo {
         totalRecords
         hasNextPage
      }
      edges {
         node {
            id
            learners {
               edges {
                  node {
                     id
                     contact {
                        id
                        personalName {
                           firstName
                           lastName
                           middleName
                        }
                        emailAddress
                     }
                  }
               }
            }
            sessions {
               edges {
                  node {
                     id
                     title
                  }
               }
            }
         }
      }
   }
}
